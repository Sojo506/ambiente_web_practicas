<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <div class="container">
        <div class="main">
            <div class="container-image">
                <img class="panda-image" src="./assets/panda-bear-panda-svgrepo-com.svg" alt="panda icon">
            </div>

            <form class="login-form">
                <h2 class="form-title">Ingrese sus credenciales</h2>

                <div class="input-group">
                    <label for="username" hidden>Username</label>
                    <input type="text" id="username" name="username" placeholder="sojo506@gmail.com">

                    <label for="username" hidden>password</label>
                    <input type="password" id="password" name="password" value="12345678" required>
                </div>

                <a class="forgot-password" href="#" target="_blank">Olvidó su password?</a>

                <button type="submit" class="login-btn">Iniciar sesión</button>
            </form>
        </div>
</body>

</html>
